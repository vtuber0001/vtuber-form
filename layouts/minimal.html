<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>별하루 · 모던 미니멀</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#15151a;--muted:#9a9aa3;--line:#ececef;--bg:#fff;--accent:#15151a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-weight:300;color:var(--ink);line-height:1.75;padding:0 24px 70px}
  .wrap{max-width:720px;margin:0 auto}
  nav{display:flex;gap:26px;justify-content:center;padding:26px 0 4px}
  nav a{font-size:12px;letter-spacing:2px;color:var(--muted);text-decoration:none;text-transform:uppercase}
  nav a.on{color:var(--ink)}
  .hero{text-align:center;padding:60px 0 50px;border-bottom:1px solid var(--line)}
  .avatar{width:96px;height:96px;border-radius:50%;margin:0 auto 26px;border:1px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:40px}
  .eyebrow{font-size:11px;letter-spacing:5px;color:var(--muted);text-transform:uppercase}
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:56px;letter-spacing:-1px;margin:14px 0 12px;line-height:1}
  .sub{color:#5b5b62;font-weight:300}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:0}
  .sect{padding:34px 0;border-bottom:1px solid var(--line)}
  .sect .lab{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:18px}
  .meta{display:flex;flex-direction:column;gap:13px}
  .meta .r{display:flex;justify-content:space-between;font-size:15px}
  .meta .k{color:var(--muted);font-weight:300}
  .meta .v{font-weight:400}
  .days{display:flex;gap:10px}
  .day{flex:1;text-align:center;padding:13px 0;font-size:13px;color:var(--muted);border:1px solid var(--line)}
  .day.on{border-color:var(--ink);color:var(--ink);font-weight:500}
  .tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:20px}
  .tag{font-size:12px;letter-spacing:1px;border:1px solid var(--line);border-radius:999px;padding:5px 15px;color:#5b5b62}
  .links{display:flex;flex-direction:column}
  .link{display:flex;justify-content:space-between;align-items:center;padding:18px 2px;border-bottom:1px solid var(--line);text-decoration:none;color:var(--ink);font-size:16px;font-weight:400;transition:padding .2s}
  .link:last-child{border:none}
  .link:hover{padding-left:12px}
  .link .ar{color:var(--muted);font-weight:300}
  footer{text-align:center;color:var(--muted);font-size:11px;letter-spacing:2px;margin-top:46px;text-transform:uppercase}
  @media(max-width:520px){h1{font-size:42px}}
</style>
</head>
<body>
<div class="wrap">
  <nav><a class="on" href="#">Profile</a><a href="#">일정</a><a href="#">노래책</a><a href="#">업보</a></nav>

  <div class="hero">
    <div class="avatar">🌙</div>
    <div class="eyebrow">VTuber · Singer</div>
    <h1>별하루</h1>
    <p class="sub">노래하는 새벽 별 요정</p>
    <div class="tags"><span class="tag">소통</span><span class="tag">노래</span><span class="tag">힐링</span><span class="tag">INFP</span></div>
  </div>

  <div class="sect">
    <div class="lab">Profile</div>
    <div class="meta">
      <div class="r"><span class="k">생일</span><span class="v">3월 21일</span></div>
      <div class="r"><span class="k">데뷔</span><span class="v">2025. 06. 01</span></div>
      <div class="r"><span class="k">메인 컬러</span><span class="v">민트 · 화이트</span></div>
      <div class="r"><span class="k">장르</span><span class="v">J-POP · 발라드</span></div>
      <div class="r"><span class="k">팬닉</span><span class="v">하루별</span></div>
    </div>
  </div>

  <div class="sect">
    <div class="lab">Schedule</div>
    <div class="days"><span class="day">일</span><span class="day">월</span><span class="day on">화</span><span class="day">수</span><span class="day on">목</span><span class="day">금</span><span class="day on">토</span></div>
    <p style="color:var(--muted);font-size:13px;text-align:center;margin-top:14px">화 · 목 · 토 — 21:00</p>
  </div>

  <div class="sect" style="border:none">
    <div class="lab">Links</div>
    <div class="links">
      <a class="link" href="#"><span>SOOP 채널</span><span class="ar">↗</span></a>
      <a class="link" href="#"><span>YouTube</span><span class="ar">↗</span></a>
      <a class="link" href="#"><span>트위터</span><span class="ar">↗</span></a>
      <a class="link" href="#"><span>팬카페</span><span class="ar">↗</span></a>
    </div>
  </div>

  <footer>© 2026 별하루</footer>
</div>
</body>
</html>
