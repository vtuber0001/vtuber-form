<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>별하루 · 다크 글래스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0a14;--glass:rgba(255,255,255,.05);--line:rgba(255,255,255,.12);--neon:#5cf2d6;--violet:#a98bff;--ink:#ecebf5;--muted:#8b87a6}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;background:var(--bg);background-image:radial-gradient(circle at 15% 0%,rgba(169,139,255,.25),transparent 40%),radial-gradient(circle at 85% 25%,rgba(92,242,214,.18),transparent 38%);color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.7;padding:0 18px 70px}
  .wrap{max-width:720px;margin:0 auto}
  nav{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;padding:20px 0}
  nav a{font-size:13px;color:var(--muted);text-decoration:none;padding:7px 15px;border-radius:999px;border:1px solid transparent}
  nav a.on{color:var(--neon);border-color:var(--line);background:var(--glass)}
  .glass{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:20px;padding:22px;margin-bottom:16px}
  .hero{text-align:center}
  .avatar{width:120px;height:120px;border-radius:50%;margin:0 auto 18px;background:radial-gradient(circle at 32% 30%,#cdb4ff,#7d4dff);display:flex;align-items:center;justify-content:center;font-size:54px;box-shadow:0 0 0 1px var(--line),0 0 40px rgba(169,139,255,.6)}
  h1{font-family:'Orbitron',sans-serif;font-weight:800;font-size:34px;letter-spacing:3px;color:#fff;text-shadow:0 0 22px rgba(92,242,214,.55)}
  .sub{color:var(--muted);margin-top:8px}
  .tags{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:14px}
  .tag{font-size:12px;letter-spacing:1px;border:1px solid var(--neon);color:var(--neon);border-radius:999px;padding:4px 13px}
  .ch{font-family:'Orbitron',sans-serif;font-size:13px;letter-spacing:2px;color:var(--neon);text-transform:uppercase;margin-bottom:14px}
  .meta .r{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px}
  .meta .r:last-child{border:none}
  .meta .k{color:var(--muted);font-weight:300}
  .meta .v{font-weight:400}
  .days{display:flex;gap:9px}
  .day{flex:1;text-align:center;padding:12px 0;border-radius:11px;background:rgba(255,255,255,.04);color:var(--muted);font-size:13px}
  .day.on{background:transparent;border:1px solid var(--neon);color:var(--neon);box-shadow:0 0 16px rgba(92,242,214,.35)}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .link{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px;border-radius:13px;text-decoration:none;color:var(--ink);font-size:14px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
  .link:hover{border-color:var(--violet);color:var(--violet);box-shadow:0 0 16px rgba(169,139,255,.3)}
  footer{text-align:center;color:var(--muted);font-size:12px;letter-spacing:2px;margin-top:24px}
  @media(max-width:480px){.links{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <nav><a class="on" href="#">PROFILE</a><a href="#">일정</a><a href="#">노래책</a><a href="#">업보</a></nav>

  <div class="glass hero">
    <div class="avatar">🌙</div>
    <h1>HARU</h1>
    <p class="sub">노래하는 새벽 별 요정 · VTuber</p>
    <div class="tags"><span class="tag">소통</span><span class="tag">종겜</span><span class="tag">노래</span><span class="tag">INFP</span></div>
  </div>

  <div class="glass">
    <div class="ch">Profile</div>
    <div class="meta">
      <div class="r"><span class="k">생일</span><span class="v">3월 21일</span></div>
      <div class="r"><span class="k">데뷔</span><span class="v">2025. 06. 01</span></div>
      <div class="r"><span class="k">메인 컬러</span><span class="v">네온 퍼플 · 민트</span></div>
      <div class="r"><span class="k">장르</span><span class="v">J-POP · 발라드</span></div>
      <div class="r"><span class="k">팬닉</span><span class="v">하루별</span></div>
    </div>
  </div>

  <div class="glass">
    <div class="ch">Schedule</div>
    <div class="days"><span class="day">일</span><span class="day">월</span><span class="day on">화</span><span class="day">수</span><span class="day on">목</span><span class="day">금</span><span class="day on">토</span></div>
    <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:13px">화 · 목 · 토 21:00 ~</p>
  </div>

  <div class="glass">
    <div class="ch">Links</div>
    <div class="links"><a class="link" href="#">SOOP</a><a class="link" href="#">YouTube</a><a class="link" href="#">트위터</a><a class="link" href="#">팬카페</a></div>
  </div>

  <footer>© 2026 HARU</footer>
</div>
</body>
</html>
