<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>별하루 · 에디토리얼 럭스</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2a2622;--gold:#b08d4f;--muted:#a59c8e;--line:#e6dfd2;--bg:#f7f3ea;--paper:#fffdf8}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Noto Serif KR','Gowun Batang',serif;font-weight:300;color:var(--ink);line-height:1.85;padding:0 22px 80px}
  .wrap{max-width:760px;margin:0 auto}
  nav{display:flex;gap:24px;justify-content:center;padding:22px 0;border-bottom:1px solid var(--line)}
  nav a{font-size:12px;letter-spacing:2px;color:var(--muted);text-decoration:none;text-transform:uppercase}
  nav a.on{color:var(--gold)}
  .kicker{text-align:center;font-size:11px;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-top:40px}
  .cover{margin-top:18px;height:260px;border-radius:3px;background:linear-gradient(135deg,#d9c7ad,#b08d4f);display:flex;align-items:center;justify-content:center;font-size:88px;position:relative}
  .cover::after{content:"";position:absolute;inset:10px;border:1px solid rgba(255,255,255,.5)}
  h1{font-family:'Playfair Display',serif;font-weight:700;font-size:62px;line-height:1.05;text-align:center;margin:26px 0 8px}
  .lead{font-family:'Playfair Display',serif;font-style:italic;font-size:19px;color:#6a5f50;text-align:center;max-width:30em;margin:0 auto 6px}
  .rule{width:46px;height:2px;background:var(--gold);margin:26px auto}
  .sect{margin-top:30px}
  .sect h2{font-family:'Playfair Display',serif;font-size:14px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:18px}
  .meta{max-width:420px;margin:0 auto}
  .meta .r{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:15px}
  .meta .r:last-child{border:none}
  .meta .k{color:var(--muted);letter-spacing:1px;font-size:13px}
  .meta .v{font-weight:500}
  .days{display:flex;justify-content:center;gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .day{padding:14px 16px;font-size:13px;color:var(--muted);border-right:1px solid var(--line)}
  .day:last-child{border-right:none}
  .day.on{color:var(--gold);font-weight:700}
  .links{max-width:420px;margin:0 auto;display:flex;flex-direction:column}
  .link{display:flex;justify-content:space-between;align-items:center;padding:16px 4px;border-bottom:1px solid var(--line);text-decoration:none;color:var(--ink);font-size:15px;letter-spacing:1px}
  .link:last-child{border:none}
  .link .ar{color:var(--gold)}
  footer{text-align:center;color:var(--muted);font-size:11px;letter-spacing:3px;margin-top:46px;text-transform:uppercase}
  @media(max-width:520px){h1{font-size:44px}.cover{height:200px;font-size:64px}}
</style>
</head>
<body>
<div class="wrap">
  <nav><a class="on" href="#">Profile</a><a href="#">일정</a><a href="#">노래책</a><a href="#">업보</a></nav>

  <div class="kicker">VTuber · Singer</div>
  <div class="cover">🌙</div>
  <h1>별하루</h1>
  <p class="lead">노래하는 새벽 별 요정. 조용한 새벽, 별빛 같은 목소리로 찾아옵니다.</p>
  <div class="rule"></div>

  <div class="sect">
    <h2>Profile</h2>
    <div class="meta">
      <div class="r"><span class="k">BIRTHDAY</span><span class="v">3월 21일</span></div>
      <div class="r"><span class="k">DEBUT</span><span class="v">2025. 06. 01</span></div>
      <div class="r"><span class="k">소속</span><span class="v">개인세</span></div>
      <div class="r"><span class="k">GENRE</span><span class="v">J-POP · 발라드</span></div>
      <div class="r"><span class="k">팬닉</span><span class="v">하루별</span></div>
    </div>
  </div>

  <div class="sect">
    <h2>Schedule</h2>
    <div class="days"><span class="day">일</span><span class="day">월</span><span class="day on">화</span><span class="day">수</span><span class="day on">목</span><span class="day">금</span><span class="day on">토</span></div>
    <p style="text-align:center;color:var(--muted);font-size:13px;margin-top:14px">화 · 목 · 토 — 저녁 9시</p>
  </div>

  <div class="sect">
    <h2>Links</h2>
    <div class="links">
      <a class="link" href="#"><span>SOOP 채널</span><span class="ar">→</span></a>
      <a class="link" href="#"><span>YouTube</span><span class="ar">→</span></a>
      <a class="link" href="#"><span>트위터</span><span class="ar">→</span></a>
      <a class="link" href="#"><span>팬카페</span><span class="ar">→</span></a>
    </div>
  </div>

  <footer>© 2026 별하루</footer>
</div>
</body>
</html>
