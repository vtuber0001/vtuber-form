<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>별하루 · 파스텔 드리미</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#6b5876;--pink:#ff9ec4;--lav:#b3a0ee;--mint:#8fe3d4;--card:rgba(255,255,255,.62);--bg1:#ffd9ec;--bg2:#d8c9ff;--bg3:#c5f0ec}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;background:linear-gradient(160deg,var(--bg1),var(--bg2) 55%,var(--bg3));font-family:'Quicksand',sans-serif;color:var(--ink);line-height:1.7;padding:0 16px 70px}
  .wrap{max-width:760px;margin:0 auto}
  nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:18px 0}
  nav a{font-weight:700;font-size:14px;color:var(--ink);text-decoration:none;padding:7px 16px;border-radius:999px;background:rgba(255,255,255,.55);backdrop-filter:blur(6px)}
  nav a.on{background:#fff;color:var(--pink)}
  .glass{background:var(--card);backdrop-filter:blur(14px);border:1.5px solid rgba(255,255,255,.7);border-radius:26px;box-shadow:0 10px 30px rgba(150,120,180,.18);padding:22px;margin-bottom:16px}
  .hero{text-align:center}
  .avatar{width:128px;height:128px;border-radius:50%;margin:0 auto 14px;background:linear-gradient(135deg,#ffc2dd,#cdbcff);border:5px solid rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:60px;box-shadow:0 8px 26px rgba(255,140,190,.35)}
  h1{font-family:'Gaegu',cursive;font-weight:700;font-size:42px;color:#e36aa0}
  .sub{font-size:16px}
  .tags{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:10px}
  .tag{font-family:'Gaegu',cursive;font-weight:700;font-size:14px;background:rgba(255,255,255,.7);border-radius:999px;padding:4px 14px}
  .ch{font-family:'Gaegu',cursive;font-weight:700;font-size:24px;color:#e36aa0;margin-bottom:12px}
  .meta .r{display:flex;gap:12px;padding:9px 0;border-bottom:1px dashed rgba(180,150,200,.35)}
  .meta .r:last-child{border:none}
  .meta .k{width:74px;color:#b58fc0;font-weight:700;font-size:14px;flex-shrink:0}
  .meta .v{font-weight:700}
  .days{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .day{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;background:rgba(255,255,255,.6);color:#c9a9d6}
  .day.on{background:linear-gradient(135deg,#ff9ec4,#cdbcff);color:#fff;box-shadow:0 4px 12px rgba(255,140,190,.4)}
  .pills{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-family:'Gaegu',cursive;font-weight:700;font-size:15px;background:rgba(255,255,255,.7);border-radius:999px;padding:5px 15px}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .link{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px;border-radius:16px;text-decoration:none;color:#fff;font-weight:700;font-size:15px;background:linear-gradient(135deg,#ff9ec4,#b3a0ee)}
  footer{text-align:center;color:rgba(107,88,118,.6);font-size:13px;margin-top:18px}
  @media(max-width:480px){.links{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <nav><a class="on" href="#">프로필</a><a href="#">일정</a><a href="#">노래책</a><a href="#">업보</a></nav>

  <div class="glass hero">
    <div class="avatar">🌙</div>
    <h1>별하루 ♡</h1>
    <p class="sub">노래하는 새벽 별 요정</p>
    <div class="tags"><span class="tag">💗 긍정적</span><span class="tag">🌙 4차원</span><span class="tag">🎀 애교</span></div>
  </div>

  <div class="glass">
    <div class="ch">♡ 별하루는요</div>
    <div class="meta">
      <div class="r"><span class="k">한마디</span><span class="v">새벽 별 요정 ✨</span></div>
      <div class="r"><span class="k">생일</span><span class="v">3월 21일</span></div>
      <div class="r"><span class="k">데뷔</span><span class="v">2025. 06. 01</span></div>
      <div class="r"><span class="k">팬닉</span><span class="v">하루별 ♥</span></div>
    </div>
  </div>

  <div class="glass">
    <div class="ch">📅 방송 요일</div>
    <div class="days"><span class="day">일</span><span class="day">월</span><span class="day on">화</span><span class="day">수</span><span class="day on">목</span><span class="day">금</span><span class="day on">토</span></div>
  </div>

  <div class="glass">
    <div class="ch">💗 좋아하는 것</div>
    <div class="pills"><span class="pill">딸기우유</span><span class="pill">고양이</span><span class="pill">새벽</span><span class="pill">노래</span></div>
  </div>

  <div class="glass">
    <div class="ch">⭐ 링크</div>
    <div class="links"><a class="link" href="#">YouTube</a><a class="link" href="#">SOOP</a><a class="link" href="#">팬카페</a><a class="link" href="#">트위터</a></div>
  </div>

  <footer>© 2026 별하루 ♥</footer>
</div>
</body>
</html>
