<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>별하루 · 정보 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{--main:#5b6ef5;--main2:#8b7cf6;--soft:#eef0fe;--accent:#16c79a;--ink:#1d2433;--muted:#7a839b;--line:#e8ebf4;--bg:#f1f3fb}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-weight:400;color:var(--ink);line-height:1.6;padding:0 16px 60px}
  .wrap{max-width:900px;margin:0 auto}
  nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:16px 0;position:sticky;top:0;background:rgba(241,243,251,.92);backdrop-filter:blur(8px);z-index:9}
  nav a{font-size:13px;color:var(--muted);text-decoration:none;padding:7px 14px;border-radius:9px}
  nav a.on{background:var(--main);color:#fff;font-weight:500}
  .hero{display:flex;gap:18px;align-items:center;background:linear-gradient(120deg,var(--main),var(--main2));border-radius:22px;padding:24px;color:#fff;box-shadow:0 14px 34px rgba(91,110,245,.3)}
  .avatar{width:92px;height:92px;border-radius:22px;flex-shrink:0;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:42px}
  h1{font-weight:900;font-size:30px;letter-spacing:-.5px}
  .sub{opacity:.92;font-size:14px;font-weight:300}
  .heroLinks{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}
  .heroLinks a{font-size:12px;background:rgba(255,255,255,.22);color:#fff;padding:5px 11px;border-radius:8px;text-decoration:none}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
  .stat{background:#fff;border-radius:14px;padding:14px;text-align:center;box-shadow:0 4px 14px rgba(91,110,245,.07)}
  .stat .e{font-size:22px}
  .stat .l{font-size:11px;color:var(--muted);margin-top:4px}
  .stat .v{font-size:14px;font-weight:700;margin-top:1px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .panel{background:#fff;border-radius:18px;padding:18px 20px;box-shadow:0 6px 18px rgba(40,50,90,.06)}
  .panel h2{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:14px}
  .panel h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--main)}
  .goal{display:flex;gap:9px;align-items:center;font-size:13px;padding:6px 0}
  .goal .n{width:24px;height:24px;border-radius:8px;background:var(--soft);color:var(--main);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  .goal.done .n{background:var(--accent);color:#fff}
  .goal.done span{color:var(--muted);text-decoration:line-through}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td{padding:8px 4px;border-bottom:1px solid var(--line)}
  td.amt{color:var(--main);font-weight:700;white-space:nowrap;width:78px}
  tr:last-child td{border:none}
  .days{display:flex;gap:8px}
  .day{flex:1;text-align:center;padding:11px 0;border-radius:10px;background:var(--soft);color:var(--muted);font-size:13px}
  .day.on{background:var(--main);color:#fff;font-weight:700}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
  @media(max-width:600px){.grid{grid-template-columns:1fr 1fr}.cols{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <nav><a class="on" href="#">프로필</a><a href="#">일정</a><a href="#">노래책</a><a href="#">업보</a></nav>

  <div class="hero">
    <div class="avatar">🌙</div>
    <div>
      <h1>별하루</h1>
      <div class="sub">노래하는 새벽 별 요정 · 종합게임</div>
      <div class="heroLinks"><a href="#">🎮 SOOP</a><a href="#">▶ 유튜브</a><a href="#">☕ 팬카페</a></div>
    </div>
  </div>

  <div class="grid">
    <div class="stat"><div class="e">🎂</div><div class="l">생일</div><div class="v">3.21</div></div>
    <div class="stat"><div class="e">✨</div><div class="l">데뷔</div><div class="v">25.06.01</div></div>
    <div class="stat"><div class="e">🎵</div><div class="l">장르</div><div class="v">J-POP</div></div>
    <div class="stat"><div class="e">💙</div><div class="l">팬닉</div><div class="v">하루별</div></div>
  </div>

  <div class="cols">
    <div class="panel">
      <h2><span class="dot"></span>방송 목표</h2>
      <div class="goal done"><span class="n">01</span><span>구독자 1000명</span></div>
      <div class="goal done"><span class="n">02</span><span>첫 합방</span></div>
      <div class="goal"><span class="n">03</span><span>커버곡 발매</span></div>
      <div class="goal"><span class="n">04</span><span>오리지널 곡</span></div>
      <div class="goal"><span class="n">05</span><span>굿즈 제작</span></div>
    </div>
    <div class="panel">
      <h2><span class="dot" style="background:var(--accent)"></span>후원 리액션</h2>
      <table>
        <tr><td class="amt">1개</td><td>감사 인사 ✨</td></tr>
        <tr><td class="amt">10개</td><td>이름 불러주기</td></tr>
        <tr><td class="amt">50개</td><td>노래 한 소절</td></tr>
        <tr><td class="amt">100개</td><td>신청곡 풀버전</td></tr>
        <tr><td class="amt">300개+</td><td>즉석 RP 토크</td></tr>
      </table>
    </div>
  </div>

  <div class="panel" style="margin-top:14px">
    <h2><span class="dot" style="background:var(--main2)"></span>방송 일정</h2>
    <div class="days"><span class="day">일</span><span class="day">월</span><span class="day on">화</span><span class="day">수</span><span class="day on">목</span><span class="day">금</span><span class="day on">토</span></div>
    <p style="color:var(--muted);font-size:13px;margin-top:12px">저녁 9시 방송 · 월요일 정기 휴방</p>
  </div>

  <footer>© 2026 별하루</footer>
</div>
</body>
</html>
