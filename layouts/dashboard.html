<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>별하루 · 정보 대시보드형</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root{--main:#3b6fd4;--soft:#eaf1fc;--accent:#1d9e75;--ink:#1f2937;--muted:#7c8aa3;--line:#e2e8f3;--bg:#f3f6fb}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Gowun Dodum',sans-serif;color:var(--ink);line-height:1.6;padding:0 14px 50px}
  .wrap{max-width:560px;margin:0 auto}
  nav{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:14px 0;position:sticky;top:0;background:rgba(243,246,251,.92);backdrop-filter:blur(8px);z-index:9}
  nav a{font-size:13px;color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:8px}
  nav a.on{background:var(--main);color:#fff}
  .hero{display:flex;gap:16px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin-top:6px}
  .avatar{width:84px;height:84px;border-radius:16px;flex-shrink:0;background:linear-gradient(135deg,#7aa6ec,#3b6fd4);display:flex;align-items:center;justify-content:center;font-size:38px}
  h1{font-family:'Black Han Sans',sans-serif;font-size:26px;font-weight:400;letter-spacing:.5px}
  .sub{color:var(--muted);font-size:14px}
  .heroLinks{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .heroLinks a{font-size:12px;background:var(--soft);color:var(--main);padding:4px 10px;border-radius:6px;text-decoration:none}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stat .l{font-size:12px;color:var(--muted)}
  .stat .v{font-size:15px;font-weight:400;margin-top:2px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-top:12px}
  .panel h2{font-size:15px;font-weight:400;display:flex;align-items:center;gap:6px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--soft)}
  .goals{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .goal{display:flex;gap:8px;align-items:center;font-size:13px}
  .goal .n{width:22px;height:22px;border-radius:6px;background:var(--soft);color:var(--main);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
  .goal.done .n{background:var(--accent);color:#fff}
  table{width:100%;border-collapse:collapse;font-size:13px}
  td{padding:7px 4px;border-bottom:1px solid var(--line)}
  td.amt{color:var(--main);font-weight:400;white-space:nowrap;width:84px}
  tr:last-child td{border:none}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <nav><a class="on" href="#">프로필</a><a href="#">일정</a><a href="#">노래책</a><a href="#">업보</a></nav>

  <div class="hero">
    <div class="avatar">🌙</div>
    <div>
      <h1>별하루</h1>
      <div class="sub">노래하는 새벽 별 요정 · 종합게임</div>
      <div class="heroLinks"><a href="#">🎮 SOOP</a><a href="#">▶ 유튜브</a><a href="#">☕ 팬카페</a></div>
    </div>
  </div>

  <div class="grid">
    <div class="stat"><div class="l">🎂 생일</div><div class="v">3월 21일</div></div>
    <div class="stat"><div class="l">✨ 데뷔</div><div class="v">2025.06.01</div></div>
    <div class="stat"><div class="l">🎵 장르</div><div class="v">J-POP · 발라드</div></div>
    <div class="stat"><div class="l">💙 팬닉</div><div class="v">하루별</div></div>
  </div>

  <div class="panel">
    <h2>🎯 방송 목표</h2>
    <div class="goals">
      <div class="goal done"><span class="n">01</span>구독자 1000명</div>
      <div class="goal done"><span class="n">02</span>첫 합방</div>
      <div class="goal"><span class="n">03</span>커버곡 발매</div>
      <div class="goal"><span class="n">04</span>오리지널 곡</div>
      <div class="goal"><span class="n">05</span>굿즈 제작</div>
      <div class="goal"><span class="n">06</span>오프 이벤트</div>
    </div>
  </div>

  <div class="panel">
    <h2>💙 후원 리액션</h2>
    <table>
      <tr><td class="amt">1개</td><td>감사 인사 ✨</td></tr>
      <tr><td class="amt">10개</td><td>이름 불러주기</td></tr>
      <tr><td class="amt">50개</td><td>짧은 노래 한 소절</td></tr>
      <tr><td class="amt">100개</td><td>신청곡 풀버전</td></tr>
      <tr><td class="amt">300개+</td><td>즉석 RP 토크</td></tr>
    </table>
  </div>

  <div class="panel">
    <h2>📅 방송 일정</h2>
    <div style="font-size:14px">화 · 목 · 토 저녁 9시 ~ &nbsp;|&nbsp; 월요일 정기 휴방</div>
  </div>

  <footer>© 2026 별하루</footer>
</div>
</body>
</html>
